<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt OCR Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Receipt OCR Demo</h1>
        <form id="uploadForm">
            <label for="imageInput" class="upload-label">
                <span>Upload a receipt image</span>
                <input type="file" id="imageInput" accept="image/*" />
            </label>
        </form>
        <div id="imagePreview"></div>
        <button id="runOcrBtn" disabled>Run OCR</button>
        <pre id="ocrResult"></pre>
        <h2>Sample Receipt</h2>
        <img src="sample/receipt_sample.png" alt="Sample Receipt" class="sample-img" />
    </div>
    <script src="app.js"></script>
</body>
</html>
